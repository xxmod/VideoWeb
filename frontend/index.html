<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideoWeb</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- ─── Login Dialog ─────────────────────────────────────── -->
    <div id="loginOverlay" class="setup-overlay hidden">
      <div class="setup-dialog">
        <div class="setup-icon">🔐</div>
        <h2 id="loginTitle">登录 VideoWeb</h2>
        <p class="setup-desc" id="loginDesc">请输入账户信息</p>
        <form id="loginForm" autocomplete="off">
          <div class="setup-field">
            <label for="loginUser">用户名</label>
            <input type="text" id="loginUser" placeholder="用户名" required>
          </div>
          <div class="setup-field">
            <label for="loginPass">密码</label>
            <input type="password" id="loginPass" placeholder="密码（可为空）">
          </div>
          <div id="loginError" class="setup-error hidden"></div>
          <button type="submit" class="btn-setup" id="btnLogin">登录</button>
        </form>
      </div>
    </div>

    <!-- ─── Settings / Setup Dialog ──────────────────────────── -->
    <div id="setupOverlay" class="setup-overlay hidden">
      <div class="setup-dialog">
        <button id="btnSetupClose" class="modal-close hidden">&times;</button>
        <div class="setup-icon">🎬</div>
        <h2 id="setupTitle">设置 VideoWeb</h2>
        <p class="setup-desc" id="setupDesc">配置电影库文件夹路径和服务端口。</p>
        <form id="setupForm" autocomplete="off">
          <div class="setup-field" id="adminFields" style="display:none">
            <label for="setupAdminUser">管理员用户名</label>
            <input type="text" id="setupAdminUser" placeholder="admin">
            <div style="margin-top:10px">
              <label for="setupAdminPass">管理员密码</label>
              <input type="password" id="setupAdminPass" placeholder="密码（可为空）">
            </div>
          </div>
          <div class="setup-field">
            <label for="setupMovieDir">电影文件夹路径</label>
            <input type="text" id="setupMovieDir" placeholder="例如 Z:\movie&teleplay\movie">
          </div>
          <div class="setup-field">
            <label for="setupTeleplayDir">电视剧文件夹路径</label>
            <input type="text" id="setupTeleplayDir" placeholder="例如 Z:\movie&teleplay\teleplay">
          </div>
          <div class="setup-field">
            <label for="setupPort">服务端口</label>
            <input type="number" id="setupPort" placeholder="48233" min="1024" max="65535">
          </div>
          <div id="setupError" class="setup-error hidden"></div>
          <button type="submit" class="btn-setup" id="btnSetup">保存并重启</button>
        </form>
      </div>
    </div>

    <!-- ─── Change Password Dialog ──────────────────────────── -->
    <div id="changePwOverlay" class="setup-overlay hidden">
      <div class="setup-dialog" style="max-width:400px">
        <button class="modal-close" onclick="document.getElementById('changePwOverlay').classList.add('hidden')">&times;</button>
        <h2>修改密码</h2>
        <form id="changePwForm" autocomplete="off" style="margin-top:20px">
          <div class="setup-field">
            <label for="cpOldPw">原密码</label>
            <input type="password" id="cpOldPw" placeholder="原密码">
          </div>
          <div class="setup-field">
            <label for="cpNewPw">新密码</label>
            <input type="password" id="cpNewPw" placeholder="新密码（可为空）">
          </div>
          <div id="changePwError" class="setup-error hidden"></div>
          <button type="submit" class="btn-setup">确认修改</button>
        </form>
      </div>
    </div>

    <!-- ─── Admin Panel Dialog ───────────────────────────────── -->
    <div id="adminOverlay" class="setup-overlay hidden">
      <div class="setup-dialog" style="max-width:520px;text-align:left">
        <button class="modal-close" onclick="document.getElementById('adminOverlay').classList.add('hidden')">&times;</button>
        <h2 style="text-align:center;margin-bottom:16px">用户管理</h2>
        <div id="adminUserList"></div>
        <div style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px">
          <h3 style="font-size:15px;margin-bottom:10px">创建新用户</h3>
          <form id="adminCreateForm" autocomplete="off" style="display:flex;gap:8px;flex-wrap:wrap">
            <input type="text" id="acUsername" placeholder="用户名" style="flex:1;min-width:100px;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px" required>
            <input type="password" id="acPassword" placeholder="密码（可空）" style="flex:1;min-width:100px;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:14px">
            <button type="submit" class="btn-setup" style="width:auto;padding:8px 18px;font-size:14px">添加</button>
          </form>
          <div id="adminError" class="setup-error hidden" style="margin-top:8px"></div>
        </div>
      </div>
    </div>

    <!-- ─── Header ─────────────────────────────────────────────── -->
    <header id="header">
      <div class="header-left">
        <h1 class="logo" onclick="location.hash='#/'">VideoWeb</h1>
      </div>
      <div class="header-center">
        <div class="tab-bar">
          <button class="tab-btn active" data-tab="movies" onclick="switchTab('movies')">电影</button>
          <button class="tab-btn" data-tab="teleplays" onclick="switchTab('teleplays')">电视剧</button>
        </div>
        <input type="search" id="searchInput" placeholder="搜索…" autocomplete="off">
      </div>
      <div class="header-right">
        <div class="user-menu" id="userMenu">
          <button class="icon-btn" id="btnUser" title="用户">👤</button>
          <div class="user-dropdown hidden" id="userDropdown">
            <div class="user-dropdown-name" id="dropdownUsername"></div>
            <button onclick="openChangePw()">修改密码</button>
            <button id="btnAdminPanel" class="hidden" onclick="openAdminPanel()">用户管理</button>
            <button onclick="doLogout()">退出登录</button>
          </div>
        </div>
        <button class="icon-btn" id="btnTheme" title="切换主题">🌓</button>
        <button class="icon-btn" id="btnSettings" title="设置">⚙️</button>
        <button class="icon-btn" id="btnRescan" title="重新扫描">⟳</button>
        <span id="movieCount"></span>
      </div>
    </header>

    <!-- ─── Library Grid ───────────────────────────────────────── -->
    <main id="library">
      <div id="continueSection" class="continue-section hidden">
        <h2 class="section-title">继续观看</h2>
        <div id="continueGrid" class="continue-grid"></div>
      </div>
      <div id="movieGrid" class="movie-grid"></div>
      <div id="teleplayGrid" class="movie-grid hidden"></div>
      <div id="loading" class="center-msg">加载中…</div>
      <div id="emptyMsg" class="center-msg hidden">未找到内容</div>
    </main>

    <!-- ─── Detail Modal ───────────────────────────────────────── -->
    <div id="detailModal" class="modal hidden">
      <div class="modal-backdrop" onclick="location.hash='#/'"></div>
      <div class="modal-content">
        <button class="modal-close" onclick="location.hash='#/'">&times;</button>
        <div class="detail-hero" id="detailHero"></div>
        <div class="detail-body">
          <div class="detail-poster" id="detailPoster"></div>
          <div class="detail-info" id="detailInfo"></div>
        </div>
        <div class="detail-cast" id="detailCast"></div>
      </div>
    </div>

    <!-- ─── TV Show Detail Modal ───────────────────────────────── -->
    <div id="showDetailModal" class="modal hidden">
      <div class="modal-backdrop" onclick="location.hash='#/'"></div>
      <div class="modal-content">
        <button class="modal-close" onclick="location.hash='#/'">&times;</button>
        <div class="detail-hero" id="showHero"></div>
        <div class="detail-body">
          <div class="detail-poster" id="showPoster"></div>
          <div class="detail-info" id="showInfo"></div>
        </div>
        <div class="detail-cast" id="showCast"></div>
        <div class="season-section" id="seasonSection"></div>
      </div>
    </div>

    <!-- ─── Video Player ───────────────────────────────────────── -->
    <div id="playerView" class="player-view hidden">
      <div class="player-header">
        <button class="btn-back" onclick="history.back()">← 返回</button>
        <span class="player-title" id="playerTitle"></span>
        <div class="subtitle-selector" id="subtitleSelector"></div>
      </div>
      <video id="videoPlayer" controls autoplay>
        您的浏览器不支持 HTML5 视频播放。
      </video>
    </div>

  </div>

  <script src="js/app.js"></script>
  <script src="js/player.js"></script>
</body>
</html>
